<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>여산초 1학기, 어땠나요?</title>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<style>
:root{
  --bg:#FAF9F5;
  --card:#FFFFFF;
  --ink:#20302B;
  --muted:#7E8A85;
  --line:#E7E4DC;
  --accent:#2E7D6B;
  --accent-soft:#E5F1EE;
  --sun:#F5C84C;
  --sun-soft:#FDF3D7;
  --radius:16px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:"Pretendard Variable",Pretendard,-apple-system,sans-serif;
  background:var(--bg);color:var(--ink);
  min-height:100vh;line-height:1.6;
  -webkit-font-smoothing:antialiased;
}
.wrap{max-width:560px;margin:0 auto;padding:28px 20px 80px}

/* ---------- 공통 요소 ---------- */
.eyebrow{
  display:inline-block;font-size:12px;font-weight:700;letter-spacing:.12em;
  color:var(--accent);background:var(--accent-soft);
  padding:5px 12px;border-radius:999px;margin-bottom:14px;
}
h1{font-size:27px;font-weight:800;letter-spacing:-.02em;line-height:1.35}
.sub{color:var(--muted);font-size:14.5px;margin-top:10px}
.card{
  background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
  padding:22px;margin-top:16px;
}
.q-label{font-size:16px;font-weight:700;letter-spacing:-.01em}
.q-hint{font-size:13px;color:var(--muted);margin-top:3px}
.optional{font-size:11.5px;font-weight:600;color:var(--muted);border:1px solid var(--line);border-radius:999px;padding:2px 8px;vertical-align:2px;margin-left:6px}
textarea,input[type=text]{
  width:100%;margin-top:12px;padding:13px 14px;
  border:1.5px solid var(--line);border-radius:12px;
  font:inherit;font-size:15px;color:var(--ink);background:#FCFCFA;
  resize:vertical;transition:border-color .15s;
}
textarea:focus,input[type=text]:focus{outline:none;border-color:var(--accent);background:#fff}
textarea{min-height:88px}
.btn{
  display:block;width:100%;padding:15px;margin-top:22px;
  border:none;border-radius:13px;cursor:pointer;
  font:inherit;font-size:16px;font-weight:700;
  background:var(--accent);color:#fff;transition:transform .1s,opacity .15s;
}
.btn:active{transform:scale(.98)}
.btn:disabled{opacity:.45;cursor:default}
.btn-ghost{background:transparent;color:var(--muted);font-weight:600;font-size:14px;padding:10px;margin-top:8px}
.btn-ghost:hover{color:var(--ink)}

/* 선택 카드 (교원/비교원) */
.role-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:22px}
.role-card{
  background:var(--card);border:2px solid var(--line);border-radius:var(--radius);
  padding:24px 16px;text-align:center;cursor:pointer;transition:border-color .15s,transform .1s;
}
.role-card:hover{border-color:var(--accent)}
.role-card:active{transform:scale(.97)}
.role-card .big{font-size:34px;display:block;margin-bottom:8px}
.role-card b{font-size:16px}
.role-card p{font-size:12.5px;color:var(--muted);margin-top:4px}

/* 진행 바 */
.progress{display:flex;gap:6px;margin-bottom:22px}
.progress span{flex:1;height:5px;border-radius:99px;background:var(--line);transition:background .3s}
.progress span.on{background:var(--accent)}

/* 온도계 슬라이더 */
.temp-wrap{margin-top:20px;text-align:center}
.temp-val{font-size:46px;font-weight:800;letter-spacing:-.03em;color:var(--accent)}
.temp-val small{font-size:22px;font-weight:700}
.temp-emoji{font-size:30px;display:block;margin-top:2px;min-height:40px}
.temp-desc{font-size:13.5px;color:var(--muted);min-height:22px}
input[type=range]{
  width:100%;margin-top:16px;-webkit-appearance:none;appearance:none;
  height:10px;border-radius:99px;
  background:linear-gradient(90deg,#8FB8FF 0%,#9BD4C6 35%,var(--sun) 70%,#F08A5D 100%);
  cursor:pointer;
}
input[type=range]::-webkit-slider-thumb{
  -webkit-appearance:none;width:30px;height:30px;border-radius:50%;
  background:#fff;border:3px solid var(--accent);box-shadow:0 2px 8px rgba(0,0,0,.18);
}
input[type=range]::-moz-range-thumb{
  width:26px;height:26px;border-radius:50%;
  background:#fff;border:3px solid var(--accent);box-shadow:0 2px 8px rgba(0,0,0,.18);
}
.temp-scale{display:flex;justify-content:space-between;font-size:11.5px;color:var(--muted);margin-top:6px}

/* 체크/라디오 선택지 */
.choices{display:flex;flex-direction:column;gap:9px;margin-top:14px}
.choice{
  display:flex;align-items:center;gap:11px;
  border:1.5px solid var(--line);border-radius:12px;
  padding:13px 14px;cursor:pointer;background:#FCFCFA;
  font-size:14.5px;transition:border-color .15s,background .15s;
}
.choice.sel{border-color:var(--accent);background:var(--accent-soft);font-weight:600}
.choice .mark{
  width:20px;height:20px;border-radius:6px;border:2px solid var(--line);
  flex-shrink:0;display:flex;align-items:center;justify-content:center;
  font-size:12px;color:#fff;transition:all .15s;
}
.choice.radio .mark{border-radius:50%}
.choice.sel .mark{background:var(--accent);border-color:var(--accent)}
.fun-badge{
  display:inline-block;font-size:12px;font-weight:700;
  background:var(--sun-soft);color:#9A7514;
  padding:4px 11px;border-radius:999px;margin-bottom:10px;
}

/* 완료 화면 */
.done-icon{font-size:52px;text-align:center;margin-bottom:10px}
.schedule{margin-top:16px}
.schedule .row{
  display:flex;gap:13px;padding:14px 0;border-bottom:1px solid var(--line);
  align-items:flex-start;
}
.schedule .row:last-child{border-bottom:none}
.schedule .day{
  flex-shrink:0;width:52px;text-align:center;
  background:var(--accent-soft);color:var(--accent);
  border-radius:10px;padding:7px 0;font-size:12.5px;font-weight:800;line-height:1.3;
}
.schedule b{font-size:14.5px}
.schedule p{font-size:13px;color:var(--muted)}

/* 관리자 */
.admin-link{text-align:center;margin-top:36px}
.admin-link a{font-size:12.5px;color:#B9BFBB;text-decoration:none;cursor:pointer}
.stat-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-top:16px}
.stat{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px;text-align:center}
.stat .num{font-size:24px;font-weight:800;color:var(--accent)}
.stat .lbl{font-size:11.5px;color:var(--muted);margin-top:2px}
.bar-row{display:flex;align-items:center;gap:10px;margin-top:9px;font-size:13px}
.bar-row .name{width:150px;flex-shrink:0;font-weight:600}
.bar-track{flex:1;height:18px;background:var(--line);border-radius:99px;overflow:hidden}
.bar-fill{height:100%;background:var(--sun);border-radius:99px;min-width:2px;transition:width .5s}
.bar-row .cnt{width:24px;text-align:right;color:var(--muted);font-weight:700}
.resp-card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px;margin-top:12px}
.resp-card .tag{font-size:11.5px;font-weight:700;padding:3px 10px;border-radius:99px;background:var(--accent-soft);color:var(--accent)}
.resp-card .tag.staff{background:var(--sun-soft);color:#9A7514}
.resp-card .temp-mini{float:right;font-size:13px;font-weight:800;color:var(--accent)}
.resp-item{margin-top:11px}
.resp-item .k{font-size:11.5px;font-weight:700;color:var(--muted);letter-spacing:.02em}
.resp-item .v{font-size:14px;margin-top:2px;white-space:pre-wrap}
.hidden{display:none}
.fade{animation:fade .35s ease}
@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
@media (max-width:420px){
  h1{font-size:23px}
  .role-grid{grid-template-columns:1fr}
}
@media (prefers-reduced-motion:reduce){
  .fade{animation:none}
}
</style>
</head>
<body>
<div class="wrap" id="app"></div>

<script>
/* ============================================================
   ★ Firebase 설정 — 여기에 붙여넣으세요 ★
   Firebase 콘솔 > 프로젝트 설정 > 내 앱 > SDK 설정(구성)
   기존 yeosan-2026 프로젝트 재사용 권장 (컬렉션만 분리됨)
============================================================ */
const firebaseConfig = {
  apiKey: "AIzaSyBBuwVXzd04_ZLNdtnOFvgQyRiTCCaDCDQ",
  authDomain: "yeosan-2026.firebaseapp.com",
  projectId: "yeosan-2026",
  storageBucket: "yeosan-2026.firebasestorage.app",
  messagingSenderId: "742004030656",
  appId: "1:742004030656:web:f85c256d1a334af5f54125"
};
const COLLECTION = "workshop_2026_s1";   // 이번 설문 전용 컬렉션
const ADMIN_CODE = "연구부2026";          // 결과 보기 코드

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

/* ---------- 상태 ---------- */
const S = { step:0, data:{ temp:65 } };
const $ = id => document.getElementById(id);
const app = $("app");

/* ---------- 온도 반응 ---------- */
function tempFace(t){
  if(t>=90) return ["🔥","이렇게까지 뜨거웠다고요? 대단합니다"];
  if(t>=75) return ["😊","꽤 괜찮은 한 학기였군요"];
  if(t>=55) return ["🙂","무난하게 잘 지나갔네요"];
  if(t>=35) return ["😮‍💨","조금 지치는 학기였나 봐요"];
  if(t>=15) return ["🥶","춥네요... 2학기엔 따뜻하게 만들어봐요"];
  return ["🧊","일단 방학부터 시급합니다"];
}

/* ---------- 화면: 시작 ---------- */
function renderIntro(){
  app.innerHTML = `
  <div class="fade">
    <span class="eyebrow">여산초 · 1학기 마무리 워크숍 사전 설문</span>
    <h1>1학기, 어땠나요?</h1>
    <p class="sub">
      7월 15~16일 교원 워크숍을 알차게 준비하기 위해 선생님들의 솔직한 이야기를 먼저 듣습니다.
      <b>완전 익명</b>이고, 3분이면 충분합니다.
    </p>
    <button class="btn" onclick="startSurvey()" style="margin-top:28px">시작하기</button>
    <div class="admin-link"><a onclick="renderAdminGate()">결과 보기 (연구부)</a></div>
  </div>`;
}

function startSurvey(){
  S.step = 1;
  renderStep();
}

/* ---------- 단계 렌더 ---------- */
const TOTAL_STEPS = 4;
function progressHTML(){
  let h = '<div class="progress">';
  for(let i=1;i<=TOTAL_STEPS;i++) h += `<span class="${i<=S.step?'on':''}"></span>`;
  return h + '</div>';
}

function renderStep(){
  if(S.step===1) return renderStep1();
  if(S.step===2) return renderStep2();
  if(S.step===3) return renderStep3T();
  if(S.step===4) return renderStep4();
}

/* STEP 1 — 1학기 온도 */
function renderStep1(){
  app.innerHTML = `
  <div class="fade">
    ${progressHTML()}
    <h1>1학기 돌아보기</h1>
    <div class="card">
      <div class="q-label">Q1. 나의 1학기 체감 온도는?</div>
      <div class="q-hint">직감으로 쓱 밀어주세요</div>
      <div class="temp-wrap">
        <div class="temp-val"><span id="tv">${S.data.temp}</span><small>°C</small></div>
        <span class="temp-emoji" id="te"></span>
        <div class="temp-desc" id="td"></div>
        <input type="range" min="0" max="100" value="${S.data.temp}" id="tempSlider">
        <div class="temp-scale"><span>0°C 혹한기</span><span>100°C 열정 만렙</span></div>
      </div>
    </div>
    <div class="card">
      <div class="q-label">Q2. 1학기 교육활동에서 잘된 점, 계속하고 싶은 것<span class="optional">선택</span></div>
      <div class="q-hint">참빛깔 교육활동(기초학력·독서·AI융합·예술·학습공동체·자치), 행사, 제도 무엇이든</div>
      <textarea id="q_good" placeholder="예) 도서관 활용 수업이 자리 잡아서 좋았어요">${S.data.good||''}</textarea>
    </div>
    <button class="btn" onclick="saveStep1()">다음</button>
  </div>`;
  const slider = $("tempSlider");
  const update = ()=>{
    const t = +slider.value;
    $("tv").textContent = t;
    const [e,d] = tempFace(t);
    $("te").textContent = e; $("td").textContent = d;
  };
  slider.addEventListener("input", update); update();
}
function saveStep1(){
  S.data.temp = +$("tempSlider").value;
  S.data.good = $("q_good").value.trim();
  S.step = 2; renderStep();
}

/* STEP 2 — 솔직 코너 */
function renderStep2(){
  app.innerHTML = `
  <div class="fade">
    ${progressHTML()}
    <h1>솔직 코너</h1>
    <p class="sub">익명이니까 마음 놓고. 여기가 이 설문의 핵심입니다.</p>
    <div class="card">
      <div class="q-label">Q3. 우리 학교에서 없어져도 되는 일, 딱 1가지</div>
      <div class="q-hint">관행, 서류, 회의, 절차... 뭐든 좋습니다</div>
      <textarea id="q_remove" placeholder="예) ○○ 결과보고는 사진 몇 장이면 충분할 것 같아요">${S.data.remove||''}</textarea>
    </div>
    <div class="card">
      <div class="q-label">Q4. 부서(업무) 간 협조가 아쉬웠던 순간<span class="optional">선택</span></div>
      <div class="q-hint">구체적인 사례일수록 개선에 큰 도움이 됩니다</div>
      <textarea id="q_coop" placeholder="예) 행사 물품 신청이 급하게 전달돼서 곤란했어요">${S.data.coop||''}</textarea>
    </div>
    <button class="btn" onclick="saveStep2()">다음</button>
    <button class="btn btn-ghost" onclick="S.step=1;renderStep()">이전으로</button>
  </div>`;
}
function saveStep2(){
  S.data.remove = $("q_remove").value.trim();
  S.data.coop = $("q_coop").value.trim();
  S.step = 3; renderStep();
}

/* STEP 3 — 업무별 운영 분석 (붙임2, 지표 단위) */
const DUTIES = [
  "교육활동 보호","특수교육 내실화","학력신장","진로교육","체육교육",
  "독서교육","ESG 실천교육(환경)","연구·전북미래학교(수업전문성)",
  "학교폭력예방·생활교육","학생자치","인성교육","정보(에듀테크)","보건(학생건강)"
];
function renderStep3T(){
  S.data.dutySel = S.data.dutySel || [];
  S.data.dutyData = S.data.dutyData || {};
  app.innerHTML = `
  <div class="fade">
    ${progressHTML()}
    <h1>업무별 운영 분석</h1>
    <p class="sub">담당 업무를 모두 선택하면 아래에 입력칸이 생깁니다. 취합되어 2학기 교육과정과 결과보고에 반영됩니다.</p>
    <div class="card">
      <div class="q-label">Q5. 담당 업무를 골라주세요</div>
      <div class="q-hint">복수 선택 가능</div>
      <div class="choices">
        ${DUTIES.map(d=>`
          <div class="choice ${S.data.dutySel.includes(d)?'sel':''}" onclick="toggleDuty(this,\`${d}\`)">
            <span class="mark">✓</span>${d}
          </div>`).join('')}
      </div>
    </div>
    <div id="dutyForms">${dutyFormsHTML()}</div>
    <button class="btn" onclick="saveStep3T()">다음</button>
    <button class="btn btn-ghost" onclick="S.step=2;renderStep()">이전으로</button>
  </div>`;
}
function dutyFormsHTML(){
  return S.data.dutySel.map(d=>{
    const v = S.data.dutyData[d] || {run:'',reflect:''};
    return `
    <div class="card">
      <div class="q-label" style="color:var(--accent)">${d}</div>
      <div class="q-hint" style="margin-top:10px;font-weight:700;color:var(--ink)">1학기 운영 내용</div>
      <textarea oninput="setDuty(\`${d}\`,'run',this.value)" placeholder="운영한 것, 우수했던 점, 보완이 필요한 점">${v.run}</textarea>
      <div class="q-hint" style="margin-top:14px;font-weight:700;color:var(--ink)">2학기 반영 내용</div>
      <textarea oninput="setDuty(\`${d}\`,'reflect',this.value)" placeholder="2학기에 바꾸거나 새로 할 것">${v.reflect}</textarea>
    </div>`;
  }).join('');
}
function toggleDuty(el,d){
  const i = S.data.dutySel.indexOf(d);
  if(i>-1){ S.data.dutySel.splice(i,1); el.classList.remove('sel'); }
  else{ S.data.dutySel.push(d); el.classList.add('sel'); }
  $("dutyForms").innerHTML = dutyFormsHTML();
}
function setDuty(d,key,val){
  S.data.dutyData[d] = S.data.dutyData[d] || {run:'',reflect:''};
  S.data.dutyData[d][key] = val;
}
function saveStep3T(){
  // 선택된 업무만 정리해서 저장
  S.data.duties = S.data.dutySel.map(d=>({
    name:d,
    run:(S.data.dutyData[d]?.run||'').trim(),
    reflect:(S.data.dutyData[d]?.reflect||'').trim()
  }));
  S.step = 4; renderStep();
}

/* STEP 4 — 마무리 */
function renderStep4(){
  app.innerHTML = `
  <div class="fade">
    ${progressHTML()}
    <h1>마지막입니다</h1>
    <div class="card">
      <div class="q-label">2학기를 시작하는 우리에게, 한마디<span class="optional">선택</span></div>
      <div class="q-hint">워크숍 자료 마지막 장에 익명으로 실릴 수 있습니다</div>
      <input type="text" id="q_cheer" maxlength="60" placeholder="예) 우리 2학기도 무사히!" value="${S.data.cheer||''}">
    </div>
    <button class="btn" id="submitBtn" onclick="submitSurvey()">제출하기</button>
    <button class="btn btn-ghost" onclick="S.step=3;renderStep()">이전으로</button>
  </div>`;
}

/* ---------- 제출 ---------- */
async function submitSurvey(){
  const btn = $("submitBtn");
  btn.disabled = true; btn.textContent = "제출 중...";
  S.data.cheer = $("q_cheer").value.trim();
  const {dutySel, dutyData, ...payload} = S.data;
  try{
    await db.collection(COLLECTION).add({
      role: 'teacher',
      ...payload,
      createdAt: firebase.firestore.FieldValue.serverTimestamp()
    });
    renderDone();
  }catch(e){
    btn.disabled = false; btn.textContent = "제출하기";
    alert("제출에 실패했습니다. 네트워크 확인 후 다시 시도해주세요.\n" + e.message);
  }
}

/* ---------- 완료 화면 ---------- */
function renderDone(){
  window.scrollTo(0,0);
  app.innerHTML = `
  <div class="fade">
    <div class="done-icon">🎉</div>
    <h1 style="text-align:center">소중한 의견, 잘 받았습니다</h1>
    <p class="sub" style="text-align:center">모든 응답은 익명으로 취합되어<br>워크숍 자료에 반영됩니다.</p>
    <div class="card">
      <div class="q-label" style="margin-bottom:6px">📅 워크숍 일정</div>
      <div class="schedule">
        <div class="row">
          <div class="day">7/15<br>수</div>
          <div>
            <b>1일차 워크숍</b> <span style="font-size:12.5px;color:var(--accent);font-weight:700">교원</span>
            <p>방과후 · 1시간~1시간 30분 · 1학기 성찰 & 2학기 계획</p>
          </div>
        </div>
        <div class="row">
          <div class="day" style="background:var(--sun-soft);color:#9A7514">7/15<br>저녁</div>
          <div>
            <b>전 교직원 석식</b> <span style="font-size:12.5px;color:#9A7514;font-weight:700">전체</span>
            <p>다 같이 맛있는 저녁 · 1학기 수고 나누기</p>
          </div>
        </div>
        <div class="row">
          <div class="day">7/16<br>목</div>
          <div>
            <b>2일차 워크숍</b> <span style="font-size:12.5px;color:var(--accent);font-weight:700">교원</span>
            <p>방과후 · 1시간 · 2학기 실천 과제 확정</p>
          </div>
        </div>
      </div>
    </div>
    <p style="text-align:center;font-size:13px;color:var(--muted);margin-top:20px">그럼, 워크숍에서 뵙겠습니다 ☀️</p>
  </div>`;
}

/* ---------- 관리자 ---------- */
function renderAdminGate(){
  app.innerHTML = `
  <div class="fade">
    <span class="eyebrow">연구부 전용</span>
    <h1>결과 보기</h1>
    <div class="card">
      <input type="text" id="adminCode" placeholder="접속 코드를 입력하세요">
      <button class="btn" onclick="checkAdmin()">확인</button>
      <button class="btn btn-ghost" onclick="renderIntro()">돌아가기</button>
    </div>
  </div>`;
  $("adminCode").addEventListener("keydown",e=>{ if(e.key==="Enter") checkAdmin(); });
}
function checkAdmin(){
  if($("adminCode").value.trim() === ADMIN_CODE) loadResults();
  else alert("코드가 맞지 않습니다.");
}

async function loadResults(){
  app.innerHTML = `<p class="sub" style="text-align:center;margin-top:60px">불러오는 중...</p>`;
  try{
    const snap = await db.collection(COLLECTION).orderBy("createdAt","desc").get();
    const docs = snap.docs.map(d=>d.data());
    renderResults(docs);
  }catch(e){
    app.innerHTML = `<p class="sub" style="text-align:center;margin-top:60px">불러오기 실패: ${e.message}</p>
    <button class="btn btn-ghost" onclick="renderIntro()">돌아가기</button>`;
  }
}

function renderResults(docs){
  const teachers = docs;
  const avgTemp = docs.length ? Math.round(docs.reduce((s,d)=>s+(d.temp||0),0)/docs.length) : 0;

  const respHTML = docs.map(d=>{
    const items = [];
    if(d.good) items.push(["좋았던 것 · 계속하고 싶은 것",d.good]);
    if(d.remove) items.push(["없어져도 되는 일",d.remove]);
    if(d.coop) items.push(["협조가 아쉬웠던 순간",d.coop]);
    if(d.duties?.length) d.duties.forEach(du=>{
      if(du.run) items.push([`[${du.name}] 1학기 운영 내용`,du.run]);
      if(du.reflect) items.push([`[${du.name}] 2학기 반영 내용`,du.reflect]);
    });
    if(d.change) items.push(["9월에 딱 하나 바꾼다면",d.change]);
    if(d.cheer) items.push(["응원 한마디",d.cheer]);
    return `
    <div class="resp-card">
      <span class="temp-mini">${d.temp??'-'}°C</span>
      ${items.map(([k,v])=>`<div class="resp-item"><div class="k">${k}</div><div class="v">${escapeHTML(v)}</div></div>`).join('')||'<div class="resp-item"><div class="v" style="color:var(--muted)">서술 응답 없음</div></div>'}
    </div>`;
  }).join('');

  app.innerHTML = `
  <div class="fade">
    <span class="eyebrow">연구부 전용 · 실시간</span>
    <h1>설문 결과</h1>
    <div class="stat-grid" style="grid-template-columns:1fr 1fr">
      <div class="stat"><div class="num">${docs.length}</div><div class="lbl">전체 응답</div></div>
      <div class="stat"><div class="num">${avgTemp}°C</div><div class="lbl">평균 체감온도</div></div>
    </div>
    <h1 style="font-size:19px;margin-top:28px">업무별 모아보기 <span style="font-size:12.5px;color:var(--muted);font-weight:600">결과보고 취합용</span></h1>
    ${DUTIES.map(du=>{
      const entries = [];
      docs.forEach(d=>(d.duties||[]).forEach(x=>{
        if(x.name===du && (x.run||x.reflect)) entries.push(x);
      }));
      if(!entries.length) return '';
      return `<div class="resp-card">
        <span class="tag">${du}</span>
        ${entries.map(t=>`
          ${t.run?`<div class="resp-item"><div class="k">1학기 운영 내용</div><div class="v">${escapeHTML(t.run)}</div></div>`:''}
          ${t.reflect?`<div class="resp-item"><div class="k">2학기 반영 내용</div><div class="v">${escapeHTML(t.reflect)}</div></div>`:''}
        `).join('')}
      </div>`;
    }).join('') || '<p class="sub">아직 업무별 응답이 없습니다.</p>'}
    <h1 style="font-size:19px;margin-top:28px">응답 전체 (${docs.length})</h1>
    ${respHTML || '<p class="sub">아직 응답이 없습니다.</p>'}
    <button class="btn btn-ghost" onclick="renderIntro()" style="margin-top:24px">처음으로</button>
  </div>`;
}

function escapeHTML(s){
  return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

renderIntro();
</script>
</body>
</html>
